name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      USE_OPENAI: "false"
      OPENAI_API_KEY: ""
      OPENAI_MODEL: "gpt-4o-mini"
      OPENAI_TIMEOUT_MS: "7000"
      PORT: "8000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Public sample checks
        run: npm run test:samples
